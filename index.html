<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>มีอะไรจะบอก 👀</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, #ffd6e0, #fff5e1, #e6d6ff);
  padding: 30px;
}

h1 { color: #ff4d88; }

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 20px;
  border: none;
}

#yes { background: #ff6fa5; color: white; }
#no { background: #ccc; }

img {
  width: 200px;
  border-radius: 20px;
  margin: 20px;
}
</style>
</head>

<body>

<h1 id="text">แก... เรามีอะไรจะบอก 👀</h1>

<img id="img" src="https://i.imgur.com/j5q9V8K.jpeg">

<br>

<button onclick="next()">อยากรู้ 🤔</button>
<button onclick="alert('แน่ใจหรอ 😏')">ไม่อยากรู้</button>

<script>
let step = 0;

let pics = [
  "https://i.imgur.com/j5q9V8K.jpeg",
  "https://i.imgur.com/3ZQ3Z7R.jpeg",
  "https://i.imgur.com/V6XbW7E.jpeg"
];

function next() {
  step++;

  if(step === 1){
    document.getElementById("text").innerText = "พร้อมยัง 😳";
    document.getElementById("img").src = pics[0];
  }
  else if(step === 2){
    document.getElementById("text").innerText = "อย่าเขินนะ 🫣";
    document.getElementById("img").src = pics[1];
  }
  else if(step === 3){
    document.getElementById("text").innerText = "ระวังตกหลุมรักนะ 😜";
    document.getElementById("img").src = pics[2];
  }
  else if(step === 4){
    document.body.innerHTML = `
      <h1>Happy Birthday 🎂💖</h1>
      <p>ขอให้มีความสุขมากๆนะ ขอบคุณที่อยู่ในชีวิตเรา 😊</p>
      <img src="https://i.imgur.com/OdL0XPt.png" width="120">
    `;
  }
}
</script>

</body>
</html>
