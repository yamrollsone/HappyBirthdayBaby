<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>มีอะไรจะให้ 👀</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, #ffd6e0, #fff5e1, #e6d6ff);
  padding: 30px;
  overflow-x: hidden;
}

h1 { color: #ff4d88; }

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 20px;
  border: none;
}

#yes { background: #ff6fa5; color: white; }
#no { background: #ccc; }

#meme {
  width: 200px;
  height: 200px;
  border-radius: 20px;
  display: none;
  margin: 20px auto;
}

.heart {
  position: fixed;
  bottom: 0;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
  to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1 id="text">แก... เรามีอะไรจะให้ 👀</h1>
<img id="meme">

<button id="yes">อยากรู้ 🤔</button>
<button id="no">ไม่อยากรู้ 🙄</button>

<audio id="bgm" src="music.mp3"></audio>

<script>
let step = 0;
let text = document.getElementById("text");
let meme = document.getElementById("meme");
let audio = document.getElementById("bgm");

document.body.onclick = () => audio.play();

/* 🐱 แมว "ตรงคำ" */
let cats = [
  "https://placekitten.com/300/301", // เขิน
  "https://placekitten.com/301/300", // น่ารัก
  "https://placekitten.com/302/300", // กวน
  "https://placekitten.com/303/300"  // อบอุ่น
];

document.getElementById("yes").onclick = () => {
  step++;
  meme.style.display = "block";

  if(step === 1){
    text.innerText = "พร้อมยังนะ 😳";
    meme.src = cats[0];
  }
  else if(step === 2){
    text.innerText = "อย่าเขินนะ 🫣";
    meme.src = cats[1];
  }
  else if(step === 3){
    text.innerText = "ระวังตกหลุมรักนะ 😜";
    meme.src = cats[2];
  }
  else if(step === 4){
    text.innerText = "ดีใจที่ได้รู้จัก 💖";
    meme.src = cats[3];
  }
  else if(step === 5){
    text.innerText = "อันสุดท้ายแล้วนะ 👀";
    meme.style.display = "none";
  }
  else if(step === 6){
    document.body.innerHTML = `
      <h1>Happy Birthday 🎂💖</h1>
      <p>ขอให้แกมีความสุขมากๆนะ 💖</p>

      <!-- 🎂 เค้กจริง -->
      <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187"
      style="width:200px;border-radius:20px;">
    `;
  }
};

/* ❌ ปุ่มหนี */
let noScale = 1;
document.getElementById("no").onclick = () => {
  noScale *= 0.7;
  document.getElementById("no").style.transform = `scale(${noScale})`;
};
</script>

</body>
</html>
