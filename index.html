<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>มีอะไรจะให้ 👀</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, #ffd6e0, #fff5e1, #e6d6ff);
  padding: 30px;
  overflow-x: hidden;
  transition: 0.3s;
}
h1 { color: #ff4d88; transition:0.3s; }
button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  transition:0.3s;
  cursor:pointer;
}
button:hover { transform: scale(1.1); }
#yes { background: #ff6fa5; color: white; }
#no { background: #ccc; position: relative; }
#meme {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 20px;
  display: none;
  margin: 20px auto;
  opacity: 0;
  transition:0.5s;
}
.heart {
  position: fixed;
  bottom: 0;
  font-size: 18px;
  animation: floatUp 4s linear infinite;
}
@keyframes floatUp {
  to { transform: translateY(-100vh); opacity:0; }
}
@keyframes floatCake {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>
<body>

<h1 id="text">แก... เรามีอะไรจะให้ 👀</h1>
<img id="meme">
<div>
  <button id="yes">อยากรู้ 🤔</button>
  <button id="no">ไม่อยากรู้ 🙄</button>
</div>

<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let text = document.getElementById("text");
let meme = document.getElementById("meme");
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let audio = document.getElementById("bgm");

// เล่นเพลงครั้งแรกเมื่อคลิก body
document.body.addEventListener("click", ()=>{ audio.play(); }, {once:true});

// 💖 hearts
function createHeart(){
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}
setInterval(createHeart,700);

// 🐱 รูปแมว
let cats=["cat1.JPG","cat2.JPG","cat3.JPG","cat4.JPG"];

// ✨ ข้อความและ yes button ตาม step
let steps=[
  {text:"พร้อมยังนะ 😳", meme:cats[0], yes:["พร้อมแล้ว!","มาเลย 😆","ไม่รอแล้วนะ 😝"]},
  {text:"อย่าเขินนะ 🫣", meme:cats[1], yes:["ไม่สน 😂","อายจัง 😳","โอเค 😎"]},
  {text:"ระวังตกหลุมรักนะ 😜", meme:cats[2], yes:["ตกแล้ว ❤️","โอ้ย 😍","เอาเลย!"]},
  {text:"ดีใจนะที่ได้รู้จักแก 💖", meme:cats[3], yes:["ต่อไป","ไปกัน 💖","ยิ้ม 😁"]},
  {text:"โอเค... อันสุดท้ายละนะ 👀", meme:null, yes:["กดนี่สิ 🤭","สุดท้ายแล้ว 😘","มาเลย!"]}
];

// 💌 คลิก yes
yesBtn.onclick = ()=>{
  step++;
  if(step<=steps.length){
    let s=steps[step-1];
    // เปลี่ยนข้อความลื่น
    text.style.opacity=0;
    setTimeout(()=>{
      text.innerText=s.text;
      text.style.opacity=1;
    },200);
    // เปลี่ยนรูป
    if(s.meme){
      meme.style.display="block";
      meme.src=s.meme;
      setTimeout(()=>meme.style.opacity=1,50);
    }else{
      meme.style.opacity=0;
      setTimeout(()=>meme.style.display="none",300);
    }
    // เปลี่ยน yes button แบบสุ่ม
    let r = Math.floor(Math.random()*s.yes.length);
    yesBtn.innerText = s.yes[r];
  }else{
    // หน้าเค้กสุดท้าย
    document.body.innerHTML=`
      <div style="padding:40px;text-align:center;background: linear-gradient(to bottom, #ffe4ec, #f5edff);min-height:100vh;">
        <h1 style="color:#ff4d88;">Happy Birthday na baby 🎂💖</h1>
        <p style="line-height:2; max-width:500px; margin:auto;">
        ขอบคุณที่เข้ามาในชีวิตเรานะ ขอให้ปีนี้เป็นปีที่ดีของแก
        ขอให้วันแย่ๆของแกถูกเยียวยาด้วยของอร่อย
        ขอให้แกรดน้ำในหัวใจตัวเองเสมอ
        ขอให้แกหายดีจากความเจ็บปวดที่ไม่เคยบอกใคร
        ขอให้แกถูกรักอยู่เสมอ
        ขอให้มีวันที่ใจดี
        ขอให้มีวันที่น่ารัก
        ขอให้มีวันที่ยิ้มได้มากขึ้น
        ขอให้มีวันที่แกชอบตัวเองมากกว่าเมื่อวาน
        ขอให้มีความสุขในทุกวัน
        </p>
        <img src="cake.WEBP" style="width:180px;margin-top:30px;animation: floatCake 3s ease-in-out infinite;">
      </div>
    `;
    // 💖 hearts ลอยตอนจบ
    setInterval(()=>{
      let h=document.createElement("div");
      h.innerText="💖";
      h.style.position="fixed";
      h.style.left=Math.random()*100+"vw";
      h.style.top=Math.random()*100+"vh";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),2000);
    },200);
  }
};

// 💥 ปุ่ม No เด้ง/ลอยหนี
noBtn.onclick = ()=>{
  let x = Math.random()*70 + 10; // top %
  let y = Math.random()*70 + 10; // left %
  noBtn.style.position="absolute";
  noBtn.style.top=x+"vh";
  noBtn.style.left=y+"vw";
  noBtn.style.transform="scale(0.9)";
};
</script>
</body>
</html>
